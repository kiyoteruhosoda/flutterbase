plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

// Release signing — reads android/key.properties written by CI or local dev.
// See docs/signing.md for setup instructions.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
}
def hasKeystore = keystoreProperties.getProperty("storeFile") != null

// Project-local debug keystore — checked into the repo so every dev and CI
// runner signs debug builds with the same key.  Without this, each machine
// generates its own ~/.android/debug.keystore, and switching APKs between
// machines triggers INSTALL_FAILED_UPDATE_INCOMPATIBLE on install (the
// previously installed APK's signature differs from the new one).
// See docs/CUSTOMISATION.md §9b.
def sharedDebugKeystore = rootProject.file("app/debug.keystore")

// Single source of truth for namespace + applicationId + the APK/AAB
// base filename.  `scripts/rename_app.sh` rewrites the two string
// constants below, and the archives base name derives from them.
def appNamespace     = "com.example.flutterbase"
def appApplicationId = "com.example.flutterbase"
def appArchivesBase  = (project.findProperty("app.archivesBaseName")
    ?: appApplicationId.tokenize('.').last())

android {
    namespace = appNamespace
    compileSdk = flutter.compileSdkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    signingConfigs {
        if (sharedDebugKeystore.exists()) {
            debug {
                keyAlias      "androiddebugkey"
                keyPassword   "android"
                storeFile     sharedDebugKeystore
                storePassword "android"
            }
        }
        if (hasKeystore) {
            release {
                keyAlias     keystoreProperties["keyAlias"]
                keyPassword  keystoreProperties["keyPassword"]
                storeFile    file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    defaultConfig {
        applicationId = appApplicationId
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    buildTypes {
        release {
            signingConfig = hasKeystore ? signingConfigs.release : signingConfigs.debug
        }
    }

    // Per-app APK filename.
    //   build/app/outputs/flutter-apk/<base>-<versionName>-<buildType>.apk
    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            output.outputFileName =
                "${appArchivesBase}-${variant.versionName}-${variant.buildType.name}.apk"
        }
    }
}

// Per-app AAB base filename.
//   build/app/outputs/bundle/<buildType>/<base>-<versionName>.aab
base.archivesName = "${appArchivesBase}-${flutterVersionName}"

flutter {
    source = "../.."
}
