# -Xmx4g: the default 1.5G runs the Gradle JVM out of heap during R8 /
# Kotlin compile when NDK 26 + SDK 35 are in the mix, surfacing as
# "Gradle build daemon disappeared unexpectedly" (OOM killer).
# MaxMetaspaceSize caps class-metadata growth so we don't drift into
# the same failure via a different path on long CI runs.
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=false
android.useAndroidX=true
android.enableJetifier=true
