name: Flutter Build

on:
  push:
    branches:
      - main

jobs:
  start-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Start ACI Runner
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.FUNC_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"github_repo\": \"${{ github.repository }}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            exit 1
          fi

      - name: Wait and monitor ACI
        run: |
          STATUS_URL="${{ secrets.FUNC_STATUS_URL }}"

          for i in $(seq 1 20); do
            echo "--- Attempt $i ---"
            RESULT=$(curl -s "$STATUS_URL")
            STATUS=$(echo $RESULT | jq -r '.status')
            LOGS=$(echo $RESULT | jq -r '.logs')

            echo "ACI Status: $STATUS"
            echo "--- ACI Logs ---"
            echo "$LOGS"

            if [ "$STATUS" = "Terminated" ]; then
              EXIT_CODE=$(echo $RESULT | jq -r '.exit_code')
              echo "ACI terminated with exit code: $EXIT_CODE"
              if [ "$EXIT_CODE" != "0" ]; then
                exit 1
              fi
            fi

            if echo "$LOGS" | grep -q "Listening for Jobs"; then
              echo "Runner is ready!"
              exit 0
            fi

            sleep 15
          done

          echo "Timeout waiting for runner"
          exit 1

  build:
    needs: start-runner
    runs-on: [self-hosted, flutter, android]
    steps:
      - uses: actions/checkout@v4
      - name: Flutter pub get
        run: flutter pub get
      - name: Flutter build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  stop-runner:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Stop ACI
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.FUNC_STOP_URL }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
