name: Flutter Build

on:
  push:
    branches:
      - main

jobs:
  start-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Start ACI Runner
        run: |
          curl -X POST \
            "${{ secrets.FUNC_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"github_repo": "${{ github.repository }}"}'

      - name: Wait for Runner
        run: sleep 60  # ACI起動とRunner登録を待つ

  build:
    needs: start-runner
    runs-on: [self-hosted, flutter, android]
    steps:
      - uses: actions/checkout@v4

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk
