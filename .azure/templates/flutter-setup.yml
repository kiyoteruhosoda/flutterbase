# ============================================================
# Reusable template: Flutter environment setup
# Usage:
#   - template: .azure/templates/flutter-setup.yml
#     parameters:
#       flutterVersion: "3.22.0"
#       javaVersion: "17"
# ============================================================

parameters:
  - name: flutterVersion
    type: string
    default: "3.22.0"
  - name: javaVersion
    type: string
    default: "17"

steps:
  - checkout: self
    fetchDepth: 0

  - task: JavaToolInstaller@0
    displayName: "Install Java ${{ parameters.javaVersion }}"
    inputs:
      versionSpec: "${{ parameters.javaVersion }}"
      jdkArchitectureOption: "x64"
      jdkSourceOption: "PreInstalled"
    condition: not(eq(variables['Agent.OS'], 'Darwin'))

  - script: |
      git clone https://github.com/flutter/flutter.git \
        --depth 1 \
        --branch ${{ parameters.flutterVersion }} \
        $(Agent.ToolsDirectory)/flutter
      echo "##vso[task.setvariable variable=PATH]$(Agent.ToolsDirectory)/flutter/bin:$(PATH)"
    displayName: "Install Flutter ${{ parameters.flutterVersion }}"

  - script: flutter --version
    displayName: "Flutter version"

  - script: flutter pub get
    displayName: "pub get"

  - script: dart run build_runner build --delete-conflicting-outputs
    displayName: "Code generation"
    continueOnError: true
